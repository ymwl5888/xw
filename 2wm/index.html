<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https:; script-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'">
  <meta name="referrer" content="no-referrer-when-downgrade">
  <script src="js/redirect.js" defer></script>
  <meta name="robots" content="noindex, nofollow">
  <title>AList 风格文件列表</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <div class="brand">
        <img src="pic/logo.svg" alt="logo" class="logo">
        <div class="title">名称</div>
      </div>
    </div>
  </header>

  <main class="container">
    <div class="card">
      <table class="file-list">
      <thead>
        <tr>
          <th>名称</th>
          <th>大小</th>
          <th>修改时间</th>
        </tr>
      </thead>
      <tbody id="files"></tbody>
      </table>
    </div>
    <div class="qr-row">
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p class="disclaimer">免责声明：本站仅为文件展示与演示用途，不提供文件托管或版权授权服务。</p>
    </div>
  </footer>

    <div id="modal" class="modal" aria-hidden="true">
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <button class="modal-close" aria-label="关闭">×</button>
      <div class="modal-body">
        <img id="modal-img" alt="预览图片">
      </div>
    </div>
  </div>

  <script src="js/main.min.js" defer></script>
</body>
</html>
